<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINN 2026 — Consejo de Administración</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pino: #0B645C;
  --olmo: #002421;
  --castano: #27BCB0;
  --fresno: #9AD9CF;
  --olivo: #E8F4F3;
  --amarillo: #FFE980;
  --blanco: #FFFFFF;
  --gris1: #616161;
  --gris2: #999999;
  --gris3: #E7E7E7;
}
* { margin:0; padding:0; box-sizing:border-box; }

/* ── Force 16:9 + scale to fill viewport ── */
html, body { height:100%; overflow:hidden; background:#000; }
body { font-family:'Poppins',sans-serif; color:var(--olmo); display:flex; align-items:center; justify-content:center; }
.deck {
  width:1280px; height:720px;
  position:relative;
  transform-origin:center center;
  background:var(--blanco);
}

/* ── Slides ── */
.slide {
  position:absolute; inset:0;
  padding:3.2rem 4.5rem 2.8rem;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity 0.35s ease;
  overflow:hidden;
  background:var(--blanco);
}
.slide.active { opacity:1; pointer-events:all; }
.slide.bg-pino { background:var(--pino); color:var(--blanco); }
.slide.bg-pino h1, .slide.bg-pino h2, .slide.bg-pino p, .slide.bg-pino li,
.slide.bg-pino .label, .slide.bg-pino .body, .slide.bg-pino .sub { color:var(--blanco); }
.slide.bg-pino .sub { color:var(--fresno); }

/* ── Typography — optimized for projection ── */
h1 { font-size:2.2rem; font-weight:700; color:var(--pino); line-height:1.3; margin-bottom:0.15rem; }
h2 { font-size:1.05rem; font-weight:400; color:var(--gris1); line-height:1.5; margin-bottom:1rem; }
h3 { font-size:0.75rem; font-weight:600; color:var(--castano); letter-spacing:0.12em; text-transform:uppercase; margin:0.7rem 0 0.3rem; }
p, li { font-size:0.92rem; line-height:1.6; color:var(--olmo); }
ul { padding-left:1.3rem; margin-bottom:0.5rem; }
li { margin-bottom:0.2rem; }
strong { font-weight:600; }

/* ── Cards ── */
.cards { display:grid; gap:0.75rem; margin:0.4rem 0; }
.c2 { grid-template-columns:repeat(2,1fr); }
.c3 { grid-template-columns:repeat(3,1fr); }
.c4 { grid-template-columns:repeat(4,1fr); }
.c5 { grid-template-columns:repeat(5,1fr); }
.card {
  background:var(--blanco);
  border:1.5px solid var(--gris3);
  border-radius:12px;
  padding:0.9rem 1rem;
}
.card.accent { background:var(--olivo); border-color:transparent; }
.card .num { font-size:2.2rem; font-weight:700; line-height:1; color:var(--pino); }
.card .label { font-size:0.78rem; font-weight:600; color:var(--olmo); margin-top:0.1rem; }
.card .sub { font-size:0.65rem; color:var(--gris2); font-weight:400; }
.card .body { font-size:0.72rem; color:var(--gris1); margin-top:0.2rem; line-height:1.5; }

/* ── Band / Footer ── */
.band {
  background:var(--olivo);
  border-radius:8px;
  padding:0.55rem 1.2rem;
  text-align:center;
  font-weight:600;
  font-size:0.85rem;
  color:var(--pino);
  margin:0.45rem 0;
}
.footer-bar {
  background:var(--olivo);
  border-radius:8px;
  padding:0.55rem 1.2rem;
  font-size:0.75rem;
  color:var(--pino);
  margin-top:auto;
  text-align:center;
  font-weight:400;
}
.footer-bar strong { color:var(--olmo); font-weight:600; }

/* ── Pipeline ── */
.pipe-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1.5px solid var(--gris3);
  padding:0.6rem 0;
}
.pipe-item:last-child { border-bottom:none; }
.pipe-name { font-weight:600; font-size:0.88rem; color:var(--olmo); }
.pipe-desc { font-size:0.72rem; color:var(--gris1); margin-top:0.05rem; }
.pipe-when {
  font-size:0.62rem;
  font-weight:600;
  color:var(--blanco);
  background:var(--pino);
  padding:0.2rem 0.65rem;
  border-radius:99px;
  white-space:nowrap;
}

/* ── Quote ── */
.quote {
  border-left:3px solid var(--castano);
  padding-left:1rem;
  font-style:italic;
  color:var(--gris1);
  font-size:0.9rem;
  margin:0.5rem 0;
}

/* ── Misc ── */
.page { position:absolute; bottom:0.8rem; right:2rem; font-size:0.6rem; color:var(--gris2); font-weight:500; }
.slide-footer-text { position:absolute; bottom:0.8rem; left:0; right:0; text-align:center; font-size:0.52rem; color:rgba(255,255,255,0.45); letter-spacing:0.3em; text-transform:uppercase; font-weight:400; }
.dinn-badge { position:absolute; bottom:0.8rem; left:2rem; font-size:0.58rem; color:var(--gris2); font-weight:500; letter-spacing:0.04em; }

/* ── DINN Logo ── */
.logo-dinn { display:inline-flex; align-items:center; gap:0.6rem; }
.logo-dinn-text { font-weight:800; letter-spacing:0.04em; }

/* ── Decorative shapes ── */
.leaf-deco { position:absolute; opacity:0.06; pointer-events:none; }

/* ── Navigation ── */
.nav {
  position:fixed; bottom:0.8rem; left:50%; transform:translateX(-50%);
  display:flex; gap:0.5rem; align-items:center; z-index:100;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(8px);
  padding:0.35rem 0.9rem;
  border-radius:99px;
}
.nav button {
  background:none; border:none; cursor:pointer;
  font-size:0.7rem; color:rgba(255,255,255,0.6); padding:0.15rem 0.3rem;
  transition:color 0.2s;
}
.nav button:hover { color:#fff; }
.dots { display:flex; gap:0.25rem; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,0.3); cursor:pointer;
  transition:all 0.25s ease;
}
.dot.active { background:var(--fresno); width:18px; border-radius:3px; }
.counter { font-size:0.55rem; color:rgba(255,255,255,0.5); min-width:2.5rem; text-align:center; font-weight:500; }

/* ── Print ── */
@media print {
  html, body { overflow:visible; background:white; height:auto; }
  .deck { transform:none !important; width:100%; height:auto; }
  .slide { position:relative; opacity:1 !important; pointer-events:all; page-break-after:always; page-break-inside:avoid; min-height:720px; }
  .nav { display:none; }
  .page { position:static; text-align:right; margin-top:1rem; }
}
</style>
</head>
<body>
<div class="deck" id="deck">
